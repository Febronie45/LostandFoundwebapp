<!DOCTYPE html>
<html>

<head>
    <title>Login - Lost & Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
        }

        .login-container {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>

</head>

<body>


    <div class="login-container">
        <h2>Login</h2>

        <form onsubmit="return loginUser()">
            <input type="email" id="email" placeholder="Enter Email" required>
            <input type="password" id="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="link">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
