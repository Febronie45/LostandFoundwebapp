<!DOCTYPE html>
<html>

<head>
    <title>Lost & Found System</title>
    <link rel="stylesheet" type="text/css" href="styles/myindexstyle.css">
</head>

<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <h1>LOST & FOUND HUB</h1>
        <div>
            <a href="#">Home</a>
            <a href="report.html" target="_blank">Report Item</a>
            <a href="login.html" target="_blank">Login</a>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div>
            <h1>Find What You Lost</h1>
            <p>A simple system to reconnect people with their belongings</p>
            <a href="report.html" target="_blank" class="btn">Report Item</a>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search lost or found items..." onkeyup="searchItems()">

        <button>Search</button>
    </div>
    <!-- RECENT ITEMS -->
    <div class="section">
        <h2>Steps to be followed:</h2>

        <div class="grid">
            <div class="card">
                <h3>STEP 1:</h3>
                <P>Click on report item</P>

            </div>

            <div class="card">
                <h3>Step 2:</h3>
                <p>Fill out the form</p>

            </div>

            <div class="card">

                <h3>Step 3:</h3>
                <p>Finally click submit</p>
            </div>



        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Lost & Found System — All Rights Reserved
    </footer>
    <script src="javascript/script.js"></script>
</body>

</html>
